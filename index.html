<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Smart Pond</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Smart Pond Control Center</h1>
            <p>Sistem Pemantauan & Kendali Sirkulasi Kolam Lele</p>
        </header>

        <main class="monitoring-section">
            <div class="card" id="card-ph">
                <h3>Derajat Keasaman (pH) Air</h3>
                <div class="value" id="ph-value">--</div>
                <div class="status" id="ph-status">Memuat data...</div>
                <div class="timestamp" id="ph-timestamp">Terakhir diperbarui: --:--:--</div>
            </div>
            
            <div class="card chart-card">
                <h3>Tren Fluktuasi pH (Real-Time)</h3>
                <div class="chart-container">
                    <canvas id="phChart"></canvas>
                </div>
            </div>
        </main>

        <section class="control-section">
            <h2>Panel Kendali Jarak Jauh</h2>
            <div class="control-grid">
                <div class="control-box">
                    <p>Katup Pembuangan (Solenoid)</p>
                    <button id="btn-katup" class="btn btn-off">OFF</button>
                </div>
                <div class="control-box">
                    <p>Pompa Pengisian Air Bersih</p>
                    <button id="btn-pompa" class="btn btn-off">OFF</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
